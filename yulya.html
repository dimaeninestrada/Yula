<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kelime Kartları — Turkish Flashcards</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kelime" />
  <meta name="theme-color" content="#0f172a" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:    #0a2540;
      --dark2:   #1a5276;
      --dark3:   #2d86c0;
      --accent:  #e63946;
      --accent-dk:#c1121f;
      --cream:   #f5f0e8;
      --white:   #ffffff;
      --gray50:  #f9f6f0;
      --gray100: #ede8df;
      --gray200: #ddd7cc;
      --gray400: #a09286;
      --gray600: #6b5f54;
      --gray700: #3d322a;
      --gray900: #1a0f08;
      --green:   #059669;
      --green-lt:#d1fae5;
      --amber:   #d97706;
      --amber-lt:#fef3c7;
      --blue:    #0284c7;
      --indigo:  #0891b2;
      --teal:    #0e7490;
      --gold:    #e8a020;
      --shadow:  0 4px 28px rgba(10,37,64,.13);
      --radius:  16px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--cream);
      color: var(--gray900);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      background: linear-gradient(145deg, #0a2540 0%, #1a5276 45%, #1a8b9a 100%);
      color: #fff;
      padding: 22px 24px 0;
      box-shadow: 0 4px 24px rgba(10,37,64,.45);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg,  rgba(255,255,255,.03) 0, rgba(255,255,255,.03) 1px, transparent 0, transparent 22px),
        repeating-linear-gradient(135deg, rgba(255,255,255,.03) 0, rgba(255,255,255,.03) 1px, transparent 0, transparent 22px);
      pointer-events: none;
    }
    header::after {
      content: '⛵';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-60%);
      font-size: 3.8rem;
      opacity: .12;
      pointer-events: none;
      user-select: none;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }
    .header-top h1 { font-size: 1.7rem; font-weight: 800; line-height: 1.2; letter-spacing: -.01em; text-shadow: 0 1px 8px rgba(0,0,0,.25); }
    .header-top h1 span { display: block; font-size: .82rem; font-weight: 400; opacity: .6; letter-spacing: .01em; margin-top: 2px; }

    nav {
      display: flex;
      gap: 4px;
      max-width: 720px;
      margin: 18px auto 0;
      position: relative;
    }
    nav button {
      background: transparent;
      border: none;
      color: rgba(255,255,255,.55);
      font-size: .95rem;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    nav button:hover { background: rgba(255,255,255,.10); color: rgba(255,255,255,.88); }
    nav button.active { background: var(--cream); color: var(--dark); font-weight: 700; }

    /* ── Main ────────────────────────────────────────── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .tab { display: none; }
    .tab.active { display: block; }

    /* ── Panel ───────────────────────────────────────── */
    .panel {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(10,37,64,.07);
    }
    .panel-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Form ────────────────────────────────────────── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: .82rem; font-weight: 600; color: var(--gray600); letter-spacing: .03em; }
    .field input, .field textarea, .field select {
      border: 1.5px solid var(--gray200);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .95rem;
      font-family: inherit;
      color: var(--gray900);
      transition: border-color .15s;
      background: var(--gray50);
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none;
      border-color: var(--indigo);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(8,145,178,.10);
    }
    .field select { cursor: pointer; }
    .field.full { grid-column: 1 / -1; }
    .field textarea { resize: vertical; min-height: 60px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: none;
      border-radius: 10px;
      font-size: .93rem;
      font-weight: 600;
      font-family: inherit;
      padding: 11px 22px;
      cursor: pointer;
      transition: filter .15s, transform .1s;
    }
    .btn:hover { filter: brightness(.9); }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: linear-gradient(135deg, var(--dark2) 0%, var(--dark) 100%); color: #fff; box-shadow: 0 2px 8px rgba(10,37,64,.25); }
    .btn-ghost   { background: var(--gray100); color: var(--gray700); }
    .btn-green   { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: #fff; box-shadow: 0 2px 8px rgba(5,150,105,.25); }
    .btn-amber   { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #fff; box-shadow: 0 2px 8px rgba(217,119,6,.25); }
    .btn-indigo  { background: linear-gradient(135deg, var(--indigo) 0%, var(--teal) 100%); color: #fff; box-shadow: 0 2px 8px rgba(8,145,178,.25); }
    .btn-sm { padding: 6px 14px; font-size: .82rem; border-radius: 8px; }
    .btn-icon { padding: 8px; border-radius: 8px; background: none; border: none; cursor: pointer; font-size: 1rem; color: var(--gray400); transition: color .15s, background .15s; }
    .btn-icon:hover { color: var(--accent); background: var(--gray100); }

    .form-actions { display: flex; gap: 10px; justify-content: flex-end; align-items: center; margin-top: 16px; }
    .msg { font-size: .85rem; padding: 8px 14px; border-radius: 8px; display: none; }
    .msg.show { display: block; }
    .msg.success { background: var(--green-lt); color: var(--green); }
    .msg.error   { background: #fee2e2; color: var(--accent-dk); }

    /* ── Word List ───────────────────────────────────── */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--gray50);
      border: 1.5px solid var(--gray200);
      border-radius: 10px;
      padding: 0 14px;
      margin-bottom: 16px;
    }
    .search-bar input {
      border: none;
      background: transparent;
      padding: 10px 0;
      font-size: .95rem;
      width: 100%;
      font-family: inherit;
    }
    .search-bar input:focus { outline: none; }
    .search-bar span { color: var(--gray400); }
    .word-count { font-size: .82rem; color: var(--gray400); margin-bottom: 14px; }

    .word-list { display: flex; flex-direction: column; gap: 8px; }
    .word-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--gray50);
      border: 1.5px solid var(--gray200);
      border-radius: 12px;
      padding: 14px 16px;
      transition: border-color .15s, box-shadow .15s;
    }
    .word-item:hover { border-color: var(--indigo); box-shadow: 0 2px 10px rgba(8,145,178,.10); }
    .word-item-main { flex: 1; min-width: 0; }
    .word-tr { font-size: 1rem; font-weight: 700; color: var(--gray900); display: flex; align-items: center; gap: 8px; }
    .word-en { font-size: .88rem; color: var(--gray600); margin-top: 2px; }
    .word-notes { font-size: .8rem; color: var(--gray400); font-style: italic; margin-top: 3px; }
    .word-stats { display: flex; gap: 8px; flex-shrink: 0; }
    .stat-pill {
      font-size: .75rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .stat-correct   { background: var(--green-lt); color: var(--green); }
    .stat-incorrect { background: #fee2e2; color: var(--accent-dk); }
    .badge-new {
      font-size: .65rem;
      font-weight: 800;
      letter-spacing: .06em;
      padding: 2px 7px;
      border-radius: 20px;
      background: #fef3c7;
      color: #92400e;
      vertical-align: middle;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray400);
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: .95rem; }


    /* ── Quiz mode toggle ────────────────────────────── */
    .quiz-mode-toggle {
      display: flex;
      background: var(--gray100);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
      gap: 4px;
    }
    .quiz-mode-btn {
      flex: 1;
      border: none;
      background: transparent;
      border-radius: 9px;
      padding: 10px 16px;
      font-size: .9rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--gray600);
      cursor: pointer;
      transition: background .18s, color .18s, box-shadow .18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .quiz-mode-btn:hover { color: var(--gray900); }
    .quiz-mode-btn.active {
      background: linear-gradient(135deg, var(--dark2) 0%, var(--teal) 100%);
      color: #fff;
      box-shadow: 0 2px 10px rgba(10,37,64,.22);
    }
    .quiz-mode-btn .badge-count {
      background: rgba(255,255,255,.22);
      color: inherit;
      font-size: .72rem;
      padding: 1px 7px;
      border-radius: 99px;
      font-weight: 700;
    }
    .quiz-mode-btn:not(.active) .badge-count {
      background: var(--gray200);
      color: var(--gray600);
    }

    /* ── Quiz settings ───────────────────────────────── */
    .quiz-settings {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .quiz-setting-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .quiz-setting-row label {
      font-size: .82rem;
      font-weight: 600;
      color: var(--gray600);
      width: 100px;
      flex-shrink: 0;
    }
    .quiz-settings select {
      flex: 1;
      border: 1.5px solid var(--gray200);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .88rem;
      font-family: inherit;
      background: var(--white);
      color: var(--gray900);
      cursor: pointer;
    }
    .quiz-settings select:focus { outline: none; border-color: var(--dark2); }

    /* ── Session bar ─────────────────────────────────── */
    .session-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .session-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .85rem;
      font-weight: 600;
      color: var(--gray600);
    }
    .session-stat .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-dark   { background: var(--indigo); }
    .dot-green  { background: var(--green); }
    .dot-amber  { background: var(--amber); }
    .dot-indigo { background: var(--teal); }

    /* ── Flip card ───────────────────────────────────── */
    .card-scene {
      perspective: 1000px;
      height: 280px;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .card-flip {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
    }
    .card-flip.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }
    .card-front {
      background: linear-gradient(160deg, #ffffff 60%, #e8f6fa 100%);
      border: 2px solid rgba(8,145,178,.18);
    }
    .card-back  {
      background: linear-gradient(145deg, #0a2540 0%, #1a5276 50%, #0e7490 100%);
      transform: rotateY(180deg);
      color: #fff;
    }
    .card-label {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .45;
      margin-bottom: 12px;
    }
    .card-word {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .card-hint {
      font-size: .88rem;
      opacity: .55;
      font-style: italic;
    }
    .card-tap {
      font-size: .8rem;
      color: var(--gray400);
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .quiz-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .quiz-actions .btn { min-width: 140px; justify-content: center; font-size: 1rem; padding: 14px 28px; }

    /* ── Quiz done screen ────────────────────────────── */
    .quiz-done {
      text-align: center;
      padding: 32px 20px;
    }
    .quiz-done .big { font-size: 3.5rem; margin-bottom: 12px; }
    .quiz-done h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
    .quiz-done p  { color: var(--gray600); margin-bottom: 20px; }
    .score-row { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
    .score-box { text-align: center; }
    .score-num { font-size: 2rem; font-weight: 800; line-height: 1; }
    .score-lbl { font-size: .8rem; color: var(--gray400); margin-top: 4px; font-weight: 600; }
    .score-green  { color: var(--green); }
    .score-amber  { color: var(--amber); }
    .score-indigo { color: var(--teal); }

    .progress-bar-wrap {
      background: var(--gray200);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--dark2) 0%, var(--indigo) 100%);
      border-radius: 99px;
      transition: width .3s;
    }
    .card-counter {
      text-align: center;
      font-size: .85rem;
      color: var(--gray400);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .quiz-no-words {
      text-align: center;
      padding: 48px 20px;
      color: var(--gray400);
    }
    .quiz-no-words .emoji { font-size: 3rem; margin-bottom: 12px; }

    /* ── Category select filter (words tab) ─────────────── */
    .cat-select-wrap {
      margin-bottom: 16px;
    }
    .cat-select-wrap select {
      width: 100%;
      border: 1.5px solid var(--gray200);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .95rem;
      font-family: inherit;
      background: var(--gray50);
      color: var(--gray900);
      cursor: pointer;
      appearance: auto;
    }
    .cat-select-wrap select:focus {
      outline: none;
      border-color: var(--dark2);
      background: var(--white);
    }

    /* ── Quiz deck word list ─────────────────────────── */
    #quiz-deck-list {
      max-height: 420px;
      overflow-y: auto;
    }

    /* learn-new empty */
    .learn-done-banner {
      text-align: center;
      padding: 36px 20px;
      background: linear-gradient(135deg, #e0f7fa 0%, #d1fae5 100%);
      border: 1.5px solid rgba(8,145,178,.15);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .learn-done-banner .big { font-size: 2.8rem; margin-bottom: 10px; }
    .learn-done-banner h2 { font-size: 1.25rem; font-weight: 800; color: var(--teal); margin-bottom: 6px; }
    .learn-done-banner p { color: #065f46; font-size: .9rem; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Мои Турецкие Карточки<span>⚓ Турецкий язык · цель 1500 слов</span></h1>
  </div>
  <nav>
    <button class="active" onclick="switchTab('quiz')">🎯 Учить</button>
    <button onclick="switchTab('words')">➕ Добавить</button>
  </nav>
</header>

<main>
  <!-- ══ MY WORDS TAB ══════════════════════════════════ -->
  <div id="tab-words" class="tab">

    <div class="panel">
      <div class="panel-title">➕Новое слово
      </div>
      <form id="add-form" onsubmit="addWord(event)">
        <div class="form-row">
          <div class="field">
            <label>СЛОВО</label>
            <input id="inp-tr" type="text" placeholder="e.g. merhaba" autocomplete="off" required />
          </div>
          <div class="field">
            <label>ПЕРЕВОД</label>
            <input id="inp-en" type="text" placeholder="e.g. привет" autocomplete="off" required />
          </div>
          <div class="field">
            <label>КАТЕГОРИЯ</label>
            <select id="inp-cat">
              <option value="other">📦 Разное</option>
              <option value="greeting">🤝 Приветствия</option>
              <option value="family">👨‍👩‍👧 Семья</option>
              <option value="profession">💼 Профессии</option>
              <option value="body">🫀 Части тела</option>
              <option value="food">🍽️ Еда и напитки</option>
              <option value="produce">🥦 Овощи и фрукты</option>
              <option value="animal">🐾 Животные</option>
              <option value="home">🏠 Дом</option>
              <option value="clothing">👕 Одежда</option>
              <option value="color">🎨 Цвета</option>
              <option value="number">🔢 Числа</option>
              <option value="time">⏰ Время</option>
              <option value="transport">🚗 Транспорт</option>
              <option value="city">🏙️ Город и места</option>
              <option value="nature">🌿 Природа</option>
              <option value="pronoun">👤 Местоимения</option>
              <option value="question">❓ Вопросы</option>
              <option value="verb">⚡ Глаголы</option>
              <option value="adjective">📝 Прилагательные</option>
              <option value="preposition">🔗 Предлоги и союзы</option>
              <option value="phrase">💬 Фразы</option>
            </select>
          </div>
          <div class="field full">
            <label>ЗАМЕТКА (примеры, контекст)</label>
            <textarea id="inp-notes" placeholder="e.g. informal greeting used any time of day"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <div id="add-msg" class="msg"></div>
          <button type="submit" class="btn btn-primary">Добавить слово</button>
        </div>
      </form>
    </div>

    <div class="panel">
      <div class="panel-title">
        <span>📚 Все слова</span>
      </div>
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="search-inp" placeholder="Search words…" oninput="renderWordList()" />
      </div>
      <div class="cat-select-wrap">
        <select id="cat-filter" onchange="setCatFilter(this.value)">
          <option value="">Все категории</option>
        </select>
      </div>
      <div id="word-count" class="word-count"></div>
      <div id="word-list" class="word-list"></div>
    </div>

  </div>

  <!-- ══ QUIZ TAB ══════════════════════════════════════ -->
  <div id="tab-quiz" class="tab active">

    <div id="quiz-no-words" class="panel quiz-no-words" style="display:none">
      <div class="emoji">📝</div>
      <p>Сначала добавьте слова, затем возвращайтесь!</p>
    </div>

    <div id="quiz-area" style="display:none">
      <div class="panel">

        <!-- Mode toggle -->
        <div class="quiz-mode-toggle">
          <button class="quiz-mode-btn" id="mode-btn-learn" onclick="setQuizMode('learn')">
            🌱 Новые <span id="badge-new-count" class="badge-count">0</span>
          </button>
          <button class="quiz-mode-btn" id="mode-btn-hard" onclick="setQuizMode('hard')">
            🔥 Сложные <span id="badge-hard-count" class="badge-count">0</span>
          </button>
          <button class="quiz-mode-btn active" id="mode-btn-repeat" onclick="setQuizMode('repeat')">
            🔁 Все <span id="badge-all-count" class="badge-count">0</span>
          </button>
        </div>

        <!-- Settings column -->
        <div class="quiz-settings">
          <div class="quiz-setting-row">
            <label>Направление</label>
            <select id="quiz-dir" onchange="startQuiz()">
              <option value="tr-en">Турецкий → Русский</option>
              <option value="en-tr">Русский → Турецкий</option>
              <option value="random">Рандом</option>
            </select>
          </div>
          <div class="quiz-setting-row">
            <label>Группа</label>
            <select id="quiz-group" onchange="startQuiz()">

// ── Storage ────────────────────────────────────────────
const STORE_KEY = 'yulya_kelime_v1';

let _memoryStore = null; // in-memory fallback when localStorage is unavailable

function isLocalStorageAvailable() {
  try {
    const t = '__ls_test__';
    localStorage.setItem(t, '1');
    localStorage.removeItem(t);
    return true;
  } catch { return false; }
}

const _lsAvailable = isLocalStorageAvailable();

function loadWords() {
  if (!_lsAvailable) return _memoryStore ? [..._memoryStore] : [];
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}

function saveWords(words) {
  if (!_lsAvailable) { _memoryStore = [...words]; return; }
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(words));
  } catch (e) {
    // QuotaExceededError on mobile — keep existing data, store only in memory
    _memoryStore = [...words];
    console.warn('localStorage full, using memory fallback:', e);
  }
}


// ── Tabs ───────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('nav button')[name === 'quiz' ? 0 : 1].classList.add('active');
  if (name === 'quiz') initQuiz();
}

// ── Add Word ───────────────────────────────────────────
function addWord(e) {
  e.preventDefault();
  const tr       = document.getElementById('inp-tr').value.trim();
  const en       = document.getElementById('inp-en').value.trim();
  const notes    = document.getElementById('inp-notes').value.trim();
  const category = document.getElementById('inp-cat').value || 'other';

  const words = loadWords();
  if (words.some(w => w.tr.toLowerCase() === tr.toLowerCase())) {
    showMsg('add-msg', 'Такое слово уже есть!', 'error');
    return;
  }

  words.push({
    id: Date.now().toString(),
    tr, en, notes, category,
    addedAt: Date.now(),
    status: 'new',
    correct: 0,
    incorrect: 0
  });
  saveWords(words);

  document.getElementById('inp-tr').value = '';
  document.getElementById('inp-en').value = '';
  document.getElementById('inp-notes').value = '';
  document.getElementById('inp-cat').value = 'other';
  document.getElementById('inp-tr').focus();
  showMsg('add-msg', `«${tr}» добавлено!`, 'success');
  populateCatFilter();
  renderWordList();
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Word List ──────────────────────────────────────────
function renderWordItem(w) {
  const isNew = (w.status || 'new') === 'new';
  const total = w.correct + w.incorrect;
  const statsHtml = total > 0
    ? `<div class="word-stats">
         <span class="stat-pill stat-correct">✓ ${w.correct}</span>
         <span class="stat-pill stat-incorrect">✗ ${w.incorrect}</span>
       </div>`
    : '';
  return `
    <div class="word-item" id="wi-${w.id}">
      <div class="word-item-main">
        <div class="word-tr">
          ${escHtml(w.tr)}
          ${isNew ? '<span class="badge-new">НОВОЕ</span>' : ''}
        </div>
        <div class="word-en">${escHtml(w.en)}</div>
        ${w.notes ? `<div class="word-notes">${escHtml(w.notes)}</div>` : ''}
      </div>
      ${statsHtml}
      <button class="btn-icon" title="Edit" onclick="editWord('${w.id}')">✏️</button>
      <button class="btn-icon" title="Delete" onclick="deleteWord('${w.id}')">🗑️</button>
    </div>`;
}


let activeCatFilter = '';

function setCatFilter(cat) {
  activeCatFilter = cat;
  renderWordList();
}

function renderWordList() {
  const words  = loadWords();
  const query  = document.getElementById('search-inp').value.trim().toLowerCase();
  const base   = words;
  const baseCat = activeCatFilter ? base.filter(w => getCat(w) === activeCatFilter) : base;
  const filtered = query
    ? baseCat.filter(w =>
        w.tr.toLowerCase().includes(query) ||
        w.en.toLowerCase().includes(query) ||
        (w.notes||'').toLowerCase().includes(query))
    : baseCat;

  const newCount     = words.filter(w => (w.status||'new') === 'new').length;
  const learnedCount = words.length - newCount;
  document.getElementById('word-count').innerHTML =
    `${words.length} ${words.length === 1 ? 'слово' : words.length < 5 ? 'слова' : 'слов'} всего` +
    (newCount > 0 ? ` &nbsp;·&nbsp; <span style="color:#1d4ed8;font-weight:700">${newCount} новых</span>` : '') +
    (learnedCount > 0 ? ` &nbsp;·&nbsp; <span style="color:var(--green);font-weight:700">${learnedCount} выучено</span>` : '');

  const listEl = document.getElementById('word-list');

  if (filtered.length === 0) {
    listEl.innerHTML = words.length === 0
      ? `<div class="empty-state"><div class="emoji">🌱</div><p>Слов пока нет — добавьте первое!</p></div>`
      : `<div class="empty-state"><div class="emoji">🔍</div><p>Ничего не найдено.</p></div>`;
    return;
  }

  listEl.innerHTML = filtered.slice().reverse().map(w => renderWordItem(w)).join('');
}

function deleteWord(id) {
  saveWords(loadWords().filter(w => w.id !== id));
  renderWordList();
}

// ── Edit Word ──────────────────────────────────────────
let editingWordId = null;

function editWord(id) {
  const words = loadWords();
  const w = words.find(w => w.id === id);
  if (!w) return;
  editingWordId = id;
  document.getElementById('edit-tr').value    = w.tr;
  document.getElementById('edit-en').value    = w.en;
  document.getElementById('edit-notes').value = w.notes || '';
  document.getElementById('edit-cat').value   = w.category || 'other';
  const modal = document.getElementById('edit-modal');
  modal.style.display = 'flex';
}

function closeEditModal() {
  document.getElementById('edit-modal').style.display = 'none';
  editingWordId = null;
}

function saveEditedWord() {
  if (!editingWordId) return;
  const tr    = document.getElementById('edit-tr').value.trim();
  const en    = document.getElementById('edit-en').value.trim();
  const notes = document.getElementById('edit-notes').value.trim();
  const cat   = document.getElementById('edit-cat').value;
  if (!tr || !en) return;
  const words = loadWords();
  const idx   = words.findIndex(w => w.id === editingWordId);
  if (idx !== -1) {
    words[idx].tr       = tr;
    words[idx].en       = en;
    words[idx].notes    = notes;
    words[idx].category = cat;
    saveWords(words);
  }
  closeEditModal();
  renderWordList();
}

// Close edit modal when clicking backdrop
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Quiz State ─────────────────────────────────────────
let quizMode = 'repeat';   // 'learn' | 'hard' | 'repeat'
let deck = [];
let deckIdx = 0;
let sessionCorrect = 0;
let sessionIncorrect = 0;
let sessionPromoted = 0;
let cardFlipped = false;

// ── Quiz Init ──────────────────────────────────────────
function initQuiz() {
  const words = loadWords();
  const noWrap  = document.getElementById('quiz-no-words');
  const quizArea = document.getElementById('quiz-area');
  if (words.length === 0) {
    noWrap.style.display = '';
    quizArea.style.display = 'none';
  } else {
    noWrap.style.display = 'none';
    quizArea.style.display = '';
    updateModeBadges();
    startQuiz();
  }
}

function updateModeBadges() {
  const words = loadWords();
  const newCount  = words.filter(w => (w.status||'new') === 'new').length;
  const hardCount = Math.min(30, words.filter(w => w.hardPinned || w.incorrect > 0).length);
  document.getElementById('badge-new-count').textContent  = newCount;
  document.getElementById('badge-hard-count').textContent = hardCount;
  document.getElementById('badge-all-count').textContent  = words.length;
}

function setQuizMode(mode) {
  quizMode = mode;
  deckListOpen = false;
  document.getElementById('mode-btn-learn').classList.toggle('active',  mode === 'learn');
  document.getElementById('mode-btn-hard').classList.toggle('active',   mode === 'hard');
  document.getElementById('mode-btn-repeat').classList.toggle('active', mode === 'repeat');
  startQuiz();
}

// ── Build deck ─────────────────────────────────────────
function buildDeck(words) {
  return [...words].sort(() => Math.random() - .5);
}

// ── Start Quiz ─────────────────────────────────────────
function startQuiz() {
  updateModeBadges();
  const allWords = loadWords();

  // Base pool by mode (no slice/sort for hard yet — applied after group filter)
  let pool = quizMode === 'learn'
    ? allWords.filter(w => (w.status || 'new') === 'new')
    : quizMode === 'hard'
      ? allWords.filter(w => w.hardPinned || w.incorrect > 0)
      : allWords;

  // Populate quiz-group select from this mode's base pool
  const grpSel = document.getElementById('quiz-group');
  const prevGrp = grpSel.value;
  grpSel.innerHTML = '<option value="">Все группы</option>';
  const catCounts = {};
  pool.forEach(w => { const c = getCat(w); catCounts[c] = (catCounts[c] || 0) + 1; });
  const catOrd = Object.keys(CATEGORIES);
  Object.keys(catCounts)
    .sort((a, b) => {
      const ia = catOrd.indexOf(a), ib = catOrd.indexOf(b);
      return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
    })
    .forEach(cat => {
      const o = document.createElement('option');
      o.value = cat;
      o.textContent = (CATEGORIES[cat] || cat) + ' · ' + catCounts[cat];
      grpSel.appendChild(o);
    });
  if ([...grpSel.options].some(o => o.value === prevGrp)) grpSel.value = prevGrp;

  // Apply group filter
  if (grpSel.value) pool = pool.filter(w => getCat(w) === grpSel.value);

  // For hard mode: sort by difficulty then cap at 30 (after group filter)
  if (quizMode === 'hard') {
    pool = pool
      .sort((a, b) => {
        if (a.hardPinned !== b.hardPinned) return a.hardPinned ? -1 : 1;
        return (b.incorrect - b.correct) - (a.incorrect - a.correct);
      })
      .slice(0, 30);
  }

  // Empty pool banners
  if (pool.length === 0) {
    const msgs = {
      learn: { icon: '✅', title: 'Всё выучено!', text: 'Нет новых слов. Добавьте новые или переходите в «Повторить все».' },
      hard:  { icon: '🏆', title: 'Сложных слов нет!', text: 'Вы отлично справляетесь — ни одного трудного слова.' },
      repeat:{ icon: '✅', title: 'Список пуст!',  text: 'Добавьте слова, чтобы начать повторение.' },
    };
    const m = msgs[quizMode];
    document.getElementById('quiz-card-wrap').innerHTML =
      `<div class="learn-done-banner">
        <div class="big">${m.icon}</div>
        <h2>${m.title}</h2>
        <p>${m.text}</p>
      </div>`;
    document.getElementById('quiz-actions').style.display = 'none';
    document.getElementById('quiz-done').style.display = 'none';
    document.getElementById('card-counter').textContent = '';
    document.getElementById('progress-fill').style.width = '0%';
    resetSessionBar();
    renderDeckWordList();
    return;
  }

  deck = buildDeck(pool);
  deckIdx = 0;
  sessionCorrect = 0;
  sessionIncorrect = 0;
  sessionPromoted = 0;

  document.getElementById('quiz-done').style.display = 'none';
  document.getElementById('quiz-actions').style.display = 'none';

  updateSessionBar();
  showCard();
  renderDeckWordList();
}

function resetSessionBar() {
  document.getElementById('stat-total').textContent  = '0 слов';
  document.getElementById('stat-correct').textContent = '0 верно';
}

// ── Show card ──────────────────────────────────────────
function showCard() {
  if (deckIdx >= deck.length) {
    endQuiz();
    return;
  }
  cardFlipped = false;
  const word = deck[deckIdx];
  const dir  = document.getElementById('quiz-dir').value;
  const showTr = dir === 'tr-en' || (dir === 'random' && Math.random() > .5);
  word._showTr = showTr;

  const front    = showTr ? word.tr : word.en;
  const back     = showTr ? word.en : word.tr;
  const frontLbl = showTr ? '🇹🇷 Turkish' : '🇷🇺 Russian';
  const backLbl  = showTr ? '🇷🇺 Russian' : '🇹🇷 Turkish';

  document.getElementById('quiz-card-wrap').innerHTML = `
    <div class="card-scene" onclick="flipCard()">
      <div class="card-flip" id="flip-card">
        <div class="card-face card-front">
          <div class="card-label">${frontLbl}</div>
          <div class="card-word">${escHtml(front)}</div>
          ${word.notes && showTr ? `<div class="card-hint">${escHtml(word.notes)}</div>` : ''}
          <div class="card-tap"><span>👆</span> перевод</div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">${backLbl}</div>
          <div class="card-word">${escHtml(back)}</div>
          ${word.notes && !showTr ? `<div class="card-hint">${escHtml(word.notes)}</div>` : ''}
        </div>
      </div>
    </div>`;

  document.getElementById('quiz-actions').style.display = 'none';
  document.getElementById('card-counter').textContent = `Карточка ${deckIdx + 1} из ${deck.length}`;
  document.getElementById('progress-fill').style.width = (deckIdx / deck.length * 100) + '%';
}

function flipCard() {
  if (cardFlipped) return;
  cardFlipped = true;
  document.getElementById('flip-card').classList.add('flipped');
  setTimeout(() => renderActionButtons(), 300);
}

function renderActionButtons() {
  const actEl = document.getElementById('quiz-actions');
  const word = deck[deckIdx];
  const pinned = word && word.hardPinned;

  let mainBtns;
  if (quizMode === 'learn') {
    mainBtns = `
      <button class="btn btn-amber" onclick="markCard(false, false)">😓 Ещё учу</button>
      <button class="btn btn-indigo" onclick="markCard(true, true)">🎓 Выучил!</button>`;
  } else {
    mainBtns = `
      <button class="btn btn-amber" onclick="markCard(false, false)">😓 Не знаю</button>
      <button class="btn btn-green" onclick="markCard(true, false)">✓ Знаю!</button>`;
  }

  const pinBtn = `
    <div style="width:100%;display:flex;justify-content:center;margin-top:2px">
      <button class="btn btn-sm" onclick="togglePin('${word.id}')" style="
        background:${pinned ? '#fef3c7' : 'var(--gray100)'};
        color:${pinned ? '#92400e' : 'var(--gray600)'};
        border:1.5px solid ${pinned ? '#f59e0b' : 'var(--gray200)'};
        gap:5px;
      ">${pinned ? '📌 В сложных' : '📌 В сложные'}</button>
    </div>`;

  actEl.innerHTML = mainBtns + pinBtn;
  actEl.style.display = 'flex';
}

function togglePin(id) {
  const words = loadWords();
  const idx = words.findIndex(w => w.id === id);
  if (idx !== -1) {
    words[idx].hardPinned = !words[idx].hardPinned;
    saveWords(words);
    if (deck[deckIdx]) deck[deckIdx].hardPinned = words[idx].hardPinned;
  }
  renderActionButtons();
}

// ── Mark card ──────────────────────────────────────────
function markCard(correct, promote) {
  const words = loadWords();
  const word  = deck[deckIdx];
  const idx   = words.findIndex(w => w.id === word.id);
  if (idx !== -1) {
    if (correct) words[idx].correct++;
    else         words[idx].incorrect++;
    if (promote) words[idx].status = 'learned';
    if (!correct && (quizMode === 'repeat' || quizMode === 'hard')) words[idx].status = 'new';
    saveWords(words);
  }

  if (correct) sessionCorrect++;
  else         sessionIncorrect++;
  if (promote) sessionPromoted++;

  deckIdx++;
  updateSessionBar();
  showCard();
}

function updateSessionBar() {
  document.getElementById('stat-total').textContent   = `${deck.length} слов`;
  document.getElementById('stat-correct').textContent = `${sessionCorrect} верно`;
}

// ── End quiz ───────────────────────────────────────────
function endQuiz() {
  document.getElementById('quiz-card-wrap').innerHTML = '';
  document.getElementById('quiz-actions').style.display = 'none';
  document.getElementById('card-counter').textContent = '';
  document.getElementById('progress-fill').style.width = '100%';

  const total = sessionCorrect + sessionIncorrect;
  const pct   = total === 0 ? 0 : Math.round((sessionCorrect / total) * 100);

  document.getElementById('done-correct').textContent = sessionCorrect;
  document.getElementById('done-total').textContent   = total;
  document.getElementById('done-pct').textContent     = pct + '%';

  if (quizMode === 'learn') {
    document.getElementById('done-title').textContent = 'Сессия завершена!';
    document.getElementById('done-sub').textContent   = `Вы перенесли ${sessionPromoted} сл. в коллекцию.`;
    document.getElementById('done-correct-lbl').textContent = 'ВЕРНО';
    document.getElementById('done-promoted').textContent = sessionPromoted;
    document.getElementById('done-promoted-box').style.display = '';
  } else if (quizMode === 'hard') {
    document.getElementById('done-title').textContent = 'Сложные — раунд завершён!';
    document.getElementById('done-sub').textContent   =
      sessionIncorrect > 0
        ? `${sessionIncorrect} сл. возвращено в «Новые слова». Продолжайте тренироваться!`
        : '🏆 Отлично — вы ответили верно на все сложные слова!';
    document.getElementById('done-correct-lbl').textContent = 'ВЕРНО';
    document.getElementById('done-promoted-box').style.display = 'none';
  } else {
    document.getElementById('done-title').textContent = 'Раунд завершён!';
    const movedBack = sessionIncorrect;
    document.getElementById('done-sub').textContent   =
      movedBack > 0
        ? `${movedBack} сл. возвращено в «Новые слова».`
        : 'Отлично — ни одного слова не возвращено!';
    document.getElementById('done-correct-lbl').textContent = 'ВЕРНО';
    document.getElementById('done-promoted-box').style.display = 'none';
  }

  document.getElementById('quiz-done').style.display = '';
  updateModeBadges();
}

// ── Deck word list (shown below quiz card, collapsible) ─
let deckListOpen = false;

function toggleDeckList() {
  deckListOpen = !deckListOpen;
  renderDeckWordList();
}

function renderDeckWordList() {
  const wrap = document.getElementById('quiz-deck-list');
  if (!wrap) return;

  const allWords = loadWords();
  let pool = quizMode === 'learn'
    ? allWords.filter(w => (w.status || 'new') === 'new')
    : quizMode === 'hard'
      ? allWords.filter(w => w.hardPinned || w.incorrect > 0)
      : allWords;

  const grpSel = document.getElementById('quiz-group');
  if (grpSel && grpSel.value) pool = pool.filter(w => getCat(w) === grpSel.value);
  if (quizMode === 'hard') pool = pool.sort((a, b) => {
    if (a.hardPinned !== b.hardPinned) return a.hardPinned ? -1 : 1;
    return (b.incorrect - b.correct) - (a.incorrect - a.correct);
  }).slice(0, 30);

  if (pool.length === 0) { wrap.innerHTML = ''; return; }

  const modeLabel = { learn: '🌱 Новые', hard: '🔥 Сложные', repeat: '🔁 Все' }[quizMode] || '';
  const chevron = deckListOpen ? '▲' : '▼';

  const listHtml = deckListOpen ? `
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px">
      ${pool.map(w => `
        <div style="display:flex;align-items:center;gap:10px;background:var(--gray50);border:1.5px solid var(--gray200);border-radius:10px;padding:10px 14px">
          <div style="flex:1;min-width:0">
            <span style="font-weight:700;color:var(--gray900)">${escHtml(w.tr)}</span>
            <span style="color:var(--gray400);margin:0 6px">—</span>
            <span style="color:var(--gray600);font-size:.92rem">${escHtml(w.en)}</span>
            ${w.notes ? `<div style="font-size:.78rem;color:var(--gray400);font-style:italic;margin-top:2px">${escHtml(w.notes)}</div>` : ''}
          </div>
        </div>`).join('')}
    </div>` : '';

  wrap.innerHTML = `
    <div style="margin-top:16px">
      <button onclick="toggleDeckList()" style="
        width:100%;display:flex;align-items:center;justify-content:space-between;
        background:var(--gray100);border:1.5px solid var(--gray200);border-radius:10px;
        padding:11px 16px;cursor:pointer;font-family:inherit;transition:background .15s;
      " onmouseover="this.style.background='var(--gray200)'" onmouseout="this.style.background='var(--gray100)'">
        <span style="font-size:.9rem;font-weight:700;color:var(--gray700);display:flex;align-items:center;gap:8px">
          ${modeLabel} — слова в этой вкладке
          <span style="font-size:.73rem;font-weight:600;background:var(--white);border:1px solid var(--gray200);color:var(--gray500);padding:2px 8px;border-radius:99px">${pool.length}</span>
        </span>
        <span style="font-size:.75rem;color:var(--gray400)">${chevron}</span>
      </button>
      ${listHtml}
    </div>`;
}

try { (function seedYulya() {
  if (_lsAvailable && localStorage.getItem(SEED_KEY_Y)) return;
  const existing = loadWords();
  const existingTr = new Set(existing.map(w => w.tr.toLowerCase()));
  const now = Date.now();
  const toAdd = SEED_WORDS_Y
    .filter(w => !existingTr.has(w.tr.toLowerCase()))
    .map((w, i) => ({
      id: 'y_' + i,
      tr: w.tr,
      en: w.en,
      notes: '',
      category: w.category,
      addedAt: now - (SEED_WORDS_Y.length - i) * 1000,
      status: 'learned',
      correct: 0,
      incorrect: 0
    }));
  if (toAdd.length > 0) saveWords([...existing, ...toAdd]);
  if (_lsAvailable) localStorage.setItem(SEED_KEY_Y, '1');
})(); } catch(e) { console.warn('seedY error', e); }

// ── One-time migration: move all untouched seed words to 'learned' ──────────
try {
  const MIGRATE_KEY = 'yulya_migrated_learned_v1';
  if (_lsAvailable && !localStorage.getItem(MIGRATE_KEY)) {
    const words = loadWords();
    let changed = false;
    words.forEach(w => {
      if (w.status === 'new' && w.correct === 0 && w.incorrect === 0) {
        w.status = 'learned';
        changed = true;
      }
    });
    if (changed) saveWords(words);
    if (_lsAvailable) localStorage.setItem(MIGRATE_KEY, '1');
  }
} catch(e) { console.warn('migrate learned error', e); }

// ── Populate category select (words tab) ───────────────
function populateCatFilter() {
  const sel = document.getElementById('cat-filter');
  if (!sel) return;
  const words = loadWords();
  const usedCats = new Set(words.map(w => getCat(w)));
  if (activeCatFilter && !usedCats.has(activeCatFilter)) activeCatFilter = '';
  sel.innerHTML = '<option value="">Все категории</option>';
  const catOrd = Object.keys(CATEGORIES);
  catOrd.filter(k => usedCats.has(k)).forEach(key => {
    const count = words.filter(w => getCat(w) === key).length;
    const o = document.createElement('option');
    o.value = key;
    o.textContent = CATEGORIES[key] + ' · ' + count;
    sel.appendChild(o);
  });
  sel.value = activeCatFilter;
}

// ── Boot ───────────────────────────────────────────────
populateCatFilter();
renderWordList();
initQuiz();
